<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Achievements</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --accent-color: #2ecc71;
            --tab-inactive: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* Form Styling */
        .form-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        /* Tab Navigation Styling */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--tab-inactive);
            padding-bottom: 10px;
        }

        .tab-btn {
            background-color: var(--tab-inactive);
            color: #555;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background-color: #d0d0d0;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* Achievements List Styling */
        .achievements-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .achievement-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--accent-color);
            position: relative;
        }

        .achievement-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .achievement-date {
            font-size: 0.85em;
            color: #777;
        }

        .achievement-category {
            font-size: 0.75em;
            background: #e1f5fe;
            color: #0288d1;
            padding: 3px 8px;
            border-radius: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .achievement-title {
            margin: 0 0 10px 0;
            color: #2c3e50;
        }

        .achievement-desc {
            margin: 0;
            line-height: 1.5;
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #e74c3c;
            padding: 5px 10px;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Achievement Portfolio</h1>
        <p>A live tracking of my personal milestones and successes.</p>
    </header>

    <div class="container">
        <div class="form-card">
            <h2>Add New Achievement</h2>
            <form id="achievementForm">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="e.g., Graduated with Honors" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="work">Work</option>
                        <option value="education">Education</option>
                        <option value="personal">Personal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date / Year</label>
                    <input type="text" id="date" placeholder="e.g., June 2026" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="3" placeholder="Describe your achievement..." required></textarea>
                </div>
                <button type="submit">Add Achievement</button>
            </form>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'all')">All</button>
            <button class="tab-btn" onclick="switchTab(event, 'work')">Work</button>
            <button class="tab-btn" onclick="switchTab(event, 'education')">Education</button>
            <button class="tab-btn" onclick="switchTab(event, 'personal')">Personal</button>
        </div>

        <div id="achievementsContainer" class="achievements-list">
            </div>
    </div>

    <script>
        const form = document.getElementById('achievementForm');
        const container = document.getElementById('achievementsContainer');
        
        // Track the currently active view tab
        let currentTab = 'all';

        // Check if data exists in localStorage, otherwise use default samples
        let achievements = JSON.parse(localStorage.getItem('myTabbedAchievements')) || [
            {
                id: 1,
                title: "Created Personal Portfolio Website",
                category: "personal",
                date: "July 2026",
                description: "Successfully built and launched an interactive web app with category tabs using vanilla JS."
            }
        ];

        // Function to render achievements filtering by the active tab
        function renderAchievements() {
            container.innerHTML = '';
            
            // Filter list based on current selection
            const filtered = currentTab === 'all' 
                ? achievements 
                : achievements.filter(item => item.category === currentTab);

            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#777;">No achievements in this category yet.</p>';
                return;
            }

            filtered.forEach(achievement => {
                const card = document.createElement('div');
                card.className = 'achievement-card';
                
                card.innerHTML = `
                    <div class="achievement-header">
                        <div class="achievement-date">${achievement.date}</div>
                        <span class="achievement-category">${achievement.category}</span>
                    </div>
                    <h3 class="achievement-title">${achievement.title}</h3>
                    <p class="achievement-desc">${achievement.description}</p>
                    <button class="delete-btn" onclick="deleteAchievement(${achievement.id})">Delete</button>
                `;
                
                container.appendChild(card);
            });
        }

        // Handles switching active tabs
        function switchTab(event, tabName) {
            currentTab = tabName;
            
            // Update visual active state on buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            event.target.classList.add('active');
            renderAchievements();
        }

        // Save current array state to localStorage
        function saveToStorage() {
            localStorage.setItem('myTabbedAchievements', JSON.stringify(achievements));
        }

        // Form submission handling
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const date = document.getElementById('date').value;
            const description = document.getElementById('description').value;

            const newAchievement = {
                id: Date.now(),
                title: title,
                category: category,
                date: date,
                description: description
            };

            achievements.push(newAchievement);
            saveToStorage();
            renderAchievements();
            form.reset();
        });

        // Function to delete an achievement
        function deleteAchievement(id) {
            achievements = achievements.filter(item => item.id !== id);
            saveToStorage();
            renderAchievements();
        }

        // Initial load
        renderAchievements();
    </script>
</body>
</html>
