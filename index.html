<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Achievements</title>
    <style>
        /* Light Mode Colors */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --accent-color: #2ecc71;
            --tab-inactive: #e0e0e0;
            --sub-text: #777777;
        }

        /* Dark Mode Colors */
        body.dark-mode {
            --bg-color: #1a1c1e;
            --card-bg: #2d3135;
            --text-color: #f0f2f5;
            --primary-color: #64b5f6;
            --tab-inactive: #42474c;
            --sub-text: #b0b8c0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--sub-text);
            margin: 0;
        }

        .theme-btn {
            position: absolute;
            top: 0;
            right: 0;
            background-color: var(--tab-inactive);
            color: var(--text-color);
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        section-heading {
            display: block;
            font-size: 1.2rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* Form Styling */
        .form-card {
            display: none;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--tab-inactive);
            background-color: var(--bg-color);
            color: var(--text-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button.submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Tab Navigation Styling */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--tab-inactive);
            padding-bottom: 10px;
        }

        .tab-btn {
            background-color: var(--tab-inactive);
            color: var(--text-color);
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* Achievements List Styling */
        .achievements-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .achievement-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--accent-color);
            position: relative;
        }

        .achievement-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .achievement-date {
            font-size: 0.85em;
            color: var(--sub-text);
        }

        .achievement-category {
            font-size: 0.75em;
            background: var(--primary-color);
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .achievement-title {
            margin: 0 0 10px 0;
        }

        .achievement-desc {
            margin: 0;
            line-height: 1.5;
            color: var(--sub-text);
        }

        .delete-btn {
            display: none;
            position: absolute;
            top: 15px;
            right: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Achievement Portfolio</h1>
        <p class="subtitle">A live tracking of my personal milestones and successes.</p>
        <button class="theme-btn" onclick="toggleTheme()">🌓 Theme</button>
    </header>

    <div class="container">
        <div id="adminFormCard" class="form-card">
            <span class="section-heading">Admin Panel</span>
            <h2>Add New Achievement</h2>
            <form id="achievementForm">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="e.g., Graduated with Honors" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="work">Work</option>
                        <option value="education">Education</option>
                        <option value="personal">Personal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date / Year</label>
                    <input type="text" id="date" placeholder="e.g., June 2026" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="3" placeholder="Describe your achievement..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Add Achievement</button>
            </form>
        </div>

        <span class="section-heading">Filter Milestones</span>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'all')">All</button>
            <button class="tab-btn" onclick="switchTab(event, 'work')">Work</button>
            <button class="tab-btn" onclick="switchTab(event, 'education')">Education</button>
            <button class="tab-btn" onclick="switchTab(event, 'personal')">Personal</button>
        </div>

        <div id="achievementsContainer" class="achievements-list">
            Loading achievements...
        </div>
    </div>

    <script>
        const form = document.getElementById('achievementForm');
        const container = document.getElementById('achievementsContainer');
        const formCard = document.getElementById('adminFormCard');
        
        let currentTab = 'all';
        let achievements = [];
        let isAdmin = false;
        let gitHubToken = '';

        // CHANGE THESE VALUES TO MATCH YOUR ACCOUNT!
        const GITHUB_USER = 'YOUR_GITHUB_USERNAME'; 
        const GITHUB_REPO = 'YOUR_REPO_NAME';
        const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/achievements.json`;

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }

        function checkAdminMode() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'admin') {
                isAdmin = true;
                formCard.style.display = 'block';
                gitHubToken = prompt("Please enter your GitHub Personal Access Token:");
            }
        }

        async function loadAchievements() {
            try {
                const response = await fetch('./achievements.json');
                achievements = await response.json();
                renderAchievements();
            } catch (error) {
                container.innerHTML = '<p style="text-align:center; color:red;">Failed to load achievements. Check if achievements.json exists.</p>';
            }
        }

        function renderAchievements() {
            container.innerHTML = '';
            const filtered = currentTab === 'all' ? achievements : achievements.filter(item => item.category === currentTab);

            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--sub-text);">No achievements here yet.</p>';
                return;
            }

            filtered.forEach(achievement => {
                const card = document.createElement('div');
                card.className = 'achievement-card';
                card.innerHTML = `
                    <div class="achievement-header">
                        <div class="achievement-date">${achievement.date}</div>
                        <span class="achievement-category">${achievement.category}</span>
                    </div>
                    <h3 class="achievement-title">${achievement.title}</h3>
                    <p class="achievement-desc">${achievement.description}</p>
                    <button class="delete-btn" id="delete-${achievement.id}" onclick="deleteAchievement(${achievement.id})">Delete</button>
                `;
                container.appendChild(card);
                if (isAdmin) {
                    document.getElementById(`delete-${achievement.id}`).style.display = 'block';
                }
            });
        }

        async function saveToGitHub() {
            try {
                const getRes = await fetch(API_URL);
                const fileData = await getRes.json();
                const fileSha = fileData.sha;

                const updatedContent = btoa(unescape(encodeURIComponent(JSON.stringify(achievements, null, 2))));

                const putRes = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${gitHubToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'Automated achievement update',
                        content: updatedContent,
                        sha: fileSha
                    })
                });

                if (putRes.ok) {
                    alert("Success! GitHub is updating your live site now.");
                } else {
                    alert("Failed to save. Double check your token.");
                }
            } catch (error) {
                console.error(error);
                alert("Error connecting straight to GitHub.");
            }
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const newAchievement = {
                id: Date.now(),
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                date: document.getElementById('date').value,
                description: document.getElementById('description').value
            };

            achievements.push(newAchievement);
            renderAchievements();
            form.reset();
            saveToGitHub();
        });

        function deleteAchievement(id) {
            achievements = achievements.filter(item => item.id !== id);
            renderAchievements();
            saveToGitHub();
        }

        function switchTab(event, tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderAchievements();
        }

        checkAdminMode();
        loadAchievements();
    </script>
</body>
</html>
