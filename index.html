<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rishik Das | Portfolio</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #ffffff;
            --border-color: #eaeaea;
            --text-color: #666666;
            --text-heading: #111111;
            --primary-color: #000000;
            --tab-inactive: transparent;
            --navbar-bg: rgba(255, 255, 255, 0.8);
            --monospace-font: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, monospace;
        }
        
        html.dark-theme-override, .dark-theme-override {
            --bg-color: #111111;
            --card-bg: #111111;
            --border-color: #222222;
            --text-color: #888888;
            --text-heading: #ffffff;
            --primary-color: #ffffff;
            --navbar-bg: rgba(17, 17, 17, 0.8);
        }
        
        * { box-sizing: border-box; letter-spacing: -0.01em; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        
        .navbar-wrapper {
            position: sticky;
            top: 0;
            width: 100%;
            background-color: var(--navbar-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }
        
        .navbar {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-links { display: flex; align-items: center; gap: 4px; }
        
        .nav-brand {
            font-family: var(--monospace-font);
            font-weight: 600;
            color: var(--text-heading);
            margin-right: 24px;
            font-size: 13px;
        }
        
        .tab-btn, .theme-toggle-btn {
            background-color: var(--tab-inactive);
            color: var(--text-color);
            padding: 6px 12px;
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.15s ease;
        }
        
        .theme-toggle-btn { font-family: var(--monospace-font); font-size: 12px; }
        .tab-btn:hover, .theme-toggle-btn:hover { color: var(--text-heading); }
        
        .tab-btn.active, .dropdown-wrapper.active .dropdown-trigger {
            background-color: var(--border-color);
            color: var(--text-heading);
            font-weight: 600;
        }
        
        /* --- SECURE DROPDOWN NAVIGATION STYLING --- */
        .dropdown-wrapper {
            position: relative;
            display: inline-flex !important; 
            align-items: center;
        }
        
        .dropdown-menu {
            display: none; /* Enforces strict default hidden state */
            position: absolute;
            top: 100%;
            left: 0;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 0;
            min-width: 160px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            margin-top: 4px;
        }
        
        /* Triggers display visibility strictly when active or hovered */
        .dropdown-wrapper:hover .dropdown-menu, .dropdown-wrapper.open .dropdown-menu {
            display: block !important;
        }
        
        .dropdown-menu button {
            width: 100%;
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-color);
            text-align: left;
            font-size: 13px;
            font-family: var(--monospace-font);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .dropdown-menu button:hover {
            background-color: var(--border-color);
            color: var(--text-heading);
        }
        
        .container { max-width: 900px; margin: 0 auto; padding: 60px 24px; }
        .hero-section { margin-bottom: 48px; padding-bottom: 40px; border-bottom: 1px solid var(--border-color); }
        .hero-grid { display: grid; grid-template-columns: 1fr 160px; align-items: center; gap: 40px; }
        
        @media (max-width: 650px) {
            .hero-grid { grid-template-columns: 1fr; text-align: center; justify-items: center; gap: 32px; }
        }
        
        .hero-text { width: 100%; }
        .hero-header-tag {
            font-family: var(--monospace-font);
            font-size: 13px;
            color: var(--text-color);
            margin-bottom: 12px;
        }
        
        .hero-section h1 { font-size: 2.8rem; font-weight: 700; color: var(--text-heading); margin: 0 0 16px 0; letter-spacing: -0.04em; line-height: 1.1; }
        .subheading { font-size: 1.1rem; line-height: 1.6; max-width: 720px; margin: 0 0 24px 0; color: var(--text-color); }
        .contact-row { font-size: 13px; font-family: var(--monospace-font); }
        .location-tag { color: var(--text-heading); font-weight: 600; }
        
        .profile-avatar-container {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        @keyframes spinRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .radar-ring {
            position: absolute;
            width: 156px;
            height: 156px;
            border: 1px dashed var(--text-color);
            border-radius: 50%;
            opacity: 0.4;
            animation: spinRing 20s linear infinite;
        }
        
        .profile-image-wrapper {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            background-color: var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        
        .profile-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .main-layout { display: grid; grid-template-columns: 1fr; gap: 48px; }
        h2 { font-size: 1.1rem; font-weight: 600; color: var(--text-heading); margin-top: 0; margin-bottom: 24px; font-family: var(--monospace-font); text-transform: uppercase; letter-spacing: 0.05em; }
        .form-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-family: var(--monospace-font); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; color: var(--text-heading); }
        input[type="text"], textarea, select { width: 100%; padding: 10px 14px; background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; color: var(--text-color); font-family: inherit; }
        input[type="text"]:focus, textarea:focus, select:focus { outline: none; border-color: var(--text-color); }
        .category-notice { font-family: var(--monospace-font); font-size: 12px; color: var(--text-heading); background-color: var(--bg-color); border: 1px solid var(--border-color); padding: 10px; border-radius: 6px; margin-bottom: 20px; }
        .submit-btn { width: 100%; background-color: var(--primary-color); color: var(--bg-color); border: 1px solid var(--primary-color); padding: 12px; font-size: 14px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: opacity 0.2s ease; }
        .submit-btn:hover { opacity: 0.9; }
        
        .achievements-list { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--border-color); }
        .achievement-card { background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 24px 0; position: relative; }
        .achievement-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
        .achievement-category { font-family: var(--monospace-font); font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-color); }
        .achievement-subcategory { font-family: var(--monospace-font); font-size: 11px; color: var(--text-heading); margin-left: 8px; background: var(--border-color); padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
        .achievement-date { font-family: var(--monospace-font); font-size: 12px; color: var(--text-color); }
        .achievement-title { font-size: 1.15rem; font-weight: 600; color: var(--text-heading); margin: 0 0 8px 0; }
        .achievement-desc { font-size: 14px; line-height: 1.6; margin: 0 0 16px 0; color: var(--text-color); }
        
        .delete-btn { background-color: transparent; color: #cc0000; border: none; font-family: var(--monospace-font); font-size: 11px; font-weight: 600; padding: 0; cursor: pointer; text-transform: uppercase; display: inline-block; margin-top: 4px; }
        .delete-btn:hover { text-decoration: underline; }
        .empty-state { text-align: center; padding: 48px 0; font-family: var(--monospace-font); font-size: 13px; color: var(--text-color); }
        
        /* Device State Access Protections */
        .admin-only, .public-user .delete-btn { display: none !important; }
        .admin-user .admin-only { display: block !important; }
    </style>
</head>
<body>
    <div class="navbar-wrapper">
        <div class="navbar">
            <div class="nav-links">
                <span class="nav-brand">Portfolio</span>
                <button class="tab-btn active" onclick="switchTab('all')">All</button>
                <button class="tab-btn" onclick="switchTab('school')">School</button>
                
                <div class="dropdown-wrapper">
                    <button class="tab-btn dropdown-trigger" onclick="toggleDropdownMenu(event)">Robotics ▾</button>
                    <div id="roboticsDropdown" class="dropdown-menu">
                        <button onclick="switchTab('robotics')">Overview</button>
                        <button onclick="switchTab('fll')">FLL</button>
                        <button onclick="switchTab('arduino')">Arduino</button>
                        <button onclick="switchTab('raspberry pi')">Raspberry Pi</button>
                    </div>
                </div>

                <button class="tab-btn" onclick="switchTab('science projects')">Science Projects</button>
                <button class="tab-btn" onclick="switchTab('coding')">Coding</button>
            </div>
            <button class="theme-toggle-btn" onclick="toggleThemeManual()">Dark mode</button>
        </div>
    </div>
    
    <div class="container">
        <header class="hero-section">
            <div class="hero-grid">
                <div class="hero-text">
                    <div class="hero-header-tag">Technical Portfolio</div>
                    <h1>Rishik Das</h1>
                    <div class="contact-row">
                        <span class="location-tag">Acton, MA, USA</span>
                    </div>
                </div>
                <div class="profile-avatar-container">
                    <div class="radar-ring"></div>
                    <div class="profile-image-wrapper">
                        <img src="profile.jpeg" alt="Rishik Das" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\' viewBox=\'0 0 100 100\'><circle cx=\'50\' cy=\'50\' r=\'40\' fill=\'%23dddddd\'/></svg>'">
                    </div>
                </div>
            </div>
        </header>
        
        <main class="main-layout">
            <section id="formCard" class="form-card admin-only">
                <h2>Log Milestone</h2>
                <div id="categoryNotice" class="category-notice"></div>
                <form id="achievementForm">
                    <div class="form-group">
                        <label for="title">Project / Title</label>
                        <input type="text" id="title" placeholder="e.g., Autonomous Maze Navigation" required>
                    </div>
                    <div class="form-group" id="categoryGroup">
                        <label for="category">Stack / Category</label>
                        <select id="category" required>
                            <option value="school">School</option>
                            <option value="robotics">Robotics</option>
                            <option value="science projects">Science Projects</option>
                            <option value="coding">Coding</option>
                        </select>
                    </div>
                    <div class="form-group" id="subcategoryGroup" style="display: none;">
                        <label for="subcategory">Robotics Subcategory</label>
                        <select id="subcategory">
                            <option value="fll">FLL</option>
                            <option value="arduino">Arduino</option>
                            <option value="raspberry pi">Raspberry Pi</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="date">Timeline</label>
                        <input type="text" id="date" placeholder="e.g., Jan 2026" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Technical Overview</label>
                        <textarea id="description" rows="4" placeholder="Describe system architecture, mechanisms, or codebase engineering..." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Publish Entry</button>
                </form>
            </section>
            
            <section class="feed-section">
                <h2>Achievements</h2>
                <div id="achievementsContainer" class="achievements-list"></div>
            </section>
        </main>
        
        <footer style="margin-top: 80px; padding-top: 20px; border-top: 1px solid var(--border-color); text-align: center;">
            <button id="adminPortalBtn" class="theme-toggle-btn" style="font-size: 11px; opacity: 0.6;">🔒 Admin Login</button>
        </footer>
    </div>

    <script>
        const form = document.getElementById('achievementForm');
        const container = document.getElementById('achievementsContainer');
        const formCard = document.getElementById('formCard');
        const categoryNotice = document.getElementById('categoryNotice');
        const categorySelect = document.getElementById('category');
        const subcategoryGroup = document.getElementById('subcategoryGroup');
        const subcategorySelect = document.getElementById('subcategory');
        const adminPortalBtn = document.getElementById('adminPortalBtn');

        let currentTab = 'all';
        let currentTheme = 'light';
        const MASTER_ADMIN_KEY = 'carrotie';

        // --- GITHUB CONFIGURATION CONFIG ---
        const GITHUB_USER = 'rishikd15'; 
        const GITHUB_REPO = 'Portfolio'; 
        const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/achievements.json`;

        let achievements = [];
        let gitHubToken = ''; // Temporarily stored safely in browser memory while logged in

        // 1. Fetch live achievements directly from the cloud repository file
        async function loadAchievements() {
            try {
                const response = await fetch('./achievements.json');
                if (!response.ok) throw new Error("File not found");
                achievements = await response.json();
            } catch (error) {
                console.warn("Could not find achievements.json. Falling back to default starter layout.", error);
                achievements = [
                    {
                        id: 1,
                        title: "FLL Innovation Project Award",
                        category: "robotics",
                        subcategory: "fll",
                        date: "Jan 2026",
                        description: "Engineered high-torque custom gear assemblies and written responsive sensors algorithms in SPIKE Prime to streamline autonomous cargo movement during field runs."
                    }
                ];
            }
            renderAchievements();
        }

        // 2. Safely push modifications straight into your live GitHub repository code
        async function saveToGitHub() {
            if (!gitHubToken) {
                alert("Missing active cloud authorization token signature. Changes applied only locally.");
                return;
            }
            try {
                // Fetch the absolute newest file data from GitHub first to get the latest SHA tracking key
                const getRes = await fetch(API_URL, {
                    headers: {
                        'Authorization': `token ${gitHubToken}`,
                        'Cache-Control': 'no-cache'
                    }
                });
                const fileData = await getRes.json();
                const fileSha = fileData.sha; // Read GitHub's freshest file version key

                // Safely package data into text format for transmission
                const updatedContent = btoa(unescape(encodeURIComponent(JSON.stringify(achievements, null, 2))));

                const putRes = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${gitHubToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'Automated milestone ledger deployment',
                        content: updatedContent,
                        sha: fileSha
                    })
                });

                if (putRes.ok) {
                    alert("Success! Cloud database updated. GitHub Pages will build your updates in ~60 seconds.");
                } else {
                    alert("Failed to write to cloud server. Check your token permissions.");
                }
            } catch (error) {
                console.error(error);
                alert("Error establishing connection to GitHub repository pipeline.");
            }
        }

        function verifyDeviceIdentity() {
            const isVerifiedAdmin = localStorage.getItem('portfolio_admin_active');
            if (isVerifiedAdmin === 'true') {
                document.body.className = 'admin-user';
                if (adminPortalBtn) adminPortalBtn.textContent = '🔓 Log Out Admin';
            } else {
                document.body.className = 'public-user';
                if (adminPortalBtn) adminPortalBtn.textContent = '🔒 Admin Login';
                gitHubToken = ''; // Clear key out of active memory on exit
            }
        }

        if (adminPortalBtn) {
            adminPortalBtn.addEventListener('click', () => {
                const isVerifiedAdmin = localStorage.getItem('portfolio_admin_active') === 'true';
                if (isVerifiedAdmin) {
                    localStorage.removeItem('portfolio_admin_active');
                    alert("Logged out. Returning to secure public view.");
                    verifyDeviceIdentity();
                    renderAchievements();
                } else {
                    const userInput = prompt("Enter Master Administrative Security Key:");
                    if (userInput === MASTER_ADMIN_KEY) {
                        // Instantly requests token access while activating administrative status
                        const tokenInput = prompt("Enter your GitHub Personal Access Token to connect live cloud saving:");
                        if (tokenInput) {
                            gitHubToken = tokenInput;
                            localStorage.setItem('portfolio_admin_active', 'true');
                            alert("Authenticated successfully! Cloud synchronization pipeline unlocked.");
                            verifyDeviceIdentity();
                            renderAchievements();
                        } else {
                            alert("Token required to manipulate database content. Authentication aborted.");
                        }
                    } else if (userInput !== null) {
                        alert("Invalid security authentication key signature.");
                    }
                }
            });
        }

        // Click trigger toggle to keep dropdown interactive on touch devices
        window.toggleDropdownMenu = function(e) {
            e.stopPropagation();
            document.querySelector('.dropdown-wrapper').classList.toggle('open');
        };

        document.addEventListener('click', () => {
            const wrapper = document.querySelector('.dropdown-wrapper');
            if (wrapper) wrapper.classList.remove('open');
        });

        window.handleCategoryChange = function(value) {
            if (value === 'robotics') {
                subcategoryGroup.style.display = 'block';
                subcategorySelect.required = true;
            } else {
                subcategoryGroup.style.display = 'none';
                subcategorySelect.required = false;
            }
        };

        function setTheme(mode) {
            currentTheme = mode;
            if (mode === 'dark') {
                document.documentElement.className = 'dark-theme-override';
            } else {
                document.documentElement.className = '';
            }
        }

        function toggleThemeManual() {
            setTheme(currentTheme === 'light' ? 'dark' : 'light');
        }

        function matchSystemTheme() {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                setTheme('dark');
            } else {
                setTheme('light');
            }
        }

        function renderAchievements() {
            container.innerHTML = '';
            const filtered = currentTab === 'all' 
                ? achievements 
                : achievements.filter(item => item.category === currentTab || item.subcategory === currentTab);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">No technical entries deployed to this stack view.</div>';
                return;
            }
            
            const isVerifiedAdmin = localStorage.getItem('portfolio_admin_active') === 'true';

            filtered.forEach(achievement => {
                const card = document.createElement('div');
                card.className = `achievement-card ${achievement.category}`;
                
                const deleteButtonHtml = isVerifiedAdmin 
                    ? `<button class="delete-btn" onclick="deleteAchievement(${achievement.id})">Decommission</button>` 
                    : '';

                const subTagHtml = achievement.subcategory 
                    ? `<span class="achievement-subcategory">${achievement.subcategory}</span>` 
                    : '';

                card.innerHTML = `
                    <div class="achievement-header">
                        <div>
                            <span class="achievement-category">${achievement.category}</span>
                            ${subTagHtml}
                        </div>
                        <div class="achievement-date">${achievement.date}</div>
                    </div>
                    <h3 class="achievement-title">${achievement.title}</h3>
                    <p class="achievement-desc">${achievement.description}</p>
                    ${deleteButtonHtml}
                `;
                container.appendChild(card);
            });
        }

        function updateFormContext() {
            if (currentTab === 'all') {
                formCard.classList.remove('auto-category');
                document.getElementById('categoryGroup').style.display = 'block';
                categorySelect.required = true;
                categorySelect.value = 'school';
                handleCategoryChange('school');
                categoryNotice.style.display = 'none';
            } 
            else if (['robotics', 'fll', 'arduino', 'raspberry pi'].includes(currentTab)) {
                formCard.classList.add('auto-category');
                document.getElementById('categoryGroup').style.display = 'none';
                categoryNotice.style.display = 'block';
                categorySelect.required = false;
                subcategoryGroup.style.display = 'block';
                subcategorySelect.required = true;
                
                if (['fll', 'arduino', 'raspberry pi'].includes(currentTab)) {
                    categoryNotice.textContent = `Targeting robotics context pipeline: ${currentTab.toUpperCase()}`;
                    subcategorySelect.value = currentTab;
                    subcategoryGroup.style.display = 'none';
                } else {
                    categoryNotice.textContent = `Targeting pipeline stack auto-fill: robotics`;
                    subcategorySelect.value = 'fll';
                }
            } 
            else {
                formCard.classList.add('auto-category');
                document.getElementById('categoryGroup').style.display = 'none';
                subcategoryGroup.style.display = 'none';
                subcategorySelect.required = false;
                categoryNotice.style.display = 'block';
                categoryNotice.textContent = `Targeting pipeline stack auto-fill: ${currentTab.toLowerCase()}`;
                categorySelect.required = false;
            }
        }

        window.switchTab = function(tabName) {
            currentTab = tabName;
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            const dropdownWrapper = document.querySelector('.dropdown-wrapper');
            if (dropdownWrapper) dropdownWrapper.classList.remove('open');

            buttons.forEach(btn => {
                if(btn.textContent.toLowerCase().replace(' ▾', '') === tabName) {
                    btn.classList.add('active');
                }
            });

            if (['fll', 'arduino', 'raspberry pi', 'robotics'].includes(tabName) && dropdownWrapper) {
                dropdownWrapper.classList.add('active');
            }

            updateFormContext();
            renderAchievements();
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('title').value;
            let category = categorySelect.value;
            if (['robotics', 'fll', 'arduino', 'raspberry pi'].includes(currentTab)) {
                category = 'robotics';
            } else if (currentTab !== 'all') {
                category = currentTab;
            }

            let subcategory = '';
            if (category === 'robotics') {
                subcategory = ['fll', 'arduino', 'raspberry pi'].includes(currentTab) ? currentTab : subcategorySelect.value;
            }

            const date = document.getElementById('date').value;
            const description = document.getElementById('description').value;
            
            const newAchievement = {
                id: Date.now(),
                title: title,
                category: category,
                subcategory: subcategory,
                date: date,
                description: description
            };
            
            achievements.push(newAchievement);
            renderAchievements();
            form.reset();
            if(category === 'robotics') handleCategoryChange('robotics');
            
            saveToGitHub();
        });

        window.deleteAchievement = function(id) {
            achievements = achievements.filter(item => item.id !== id);
            renderAchievements();
            
            saveToGitHub();
        }

        // Global initialization sequence
        verifyDeviceIdentity();
        matchSystemTheme();
        loadAchievements();
    </script>
</body>
</html>
