<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Achievements</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --accent-color: #2ecc71;
            --tab-inactive: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* Tab Navigation Styling */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--tab-inactive);
            padding-bottom: 10px;
        }

        .tab-btn {
            background-color: var(--tab-inactive);
            color: #555;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background-color: #d0d0d0;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* Achievements List Styling */
        .achievements-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .achievement-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--accent-color);
            position: relative;
        }

        .achievement-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .achievement-date {
            font-size: 0.85em;
            color: #777;
        }

        .achievement-category {
            font-size: 0.75em;
            background: #e1f5fe;
            color: #0288d1;
            padding: 3px 8px;
            border-radius: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .achievement-title {
            margin: 0 0 10px 0;
            color: #2c3e50;
        }

        .achievement-desc {
            margin: 0;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Achievement Portfolio</h1>
        <p>A live tracking of my personal milestones and successes.</p>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'all')">All</button>
            <button class="tab-btn" onclick="switchTab(event, 'work')">Work</button>
            <button class="tab-btn" onclick="switchTab(event, 'education')">Education</button>
            <button class="tab-btn" onclick="switchTab(event, 'personal')">Personal</button>
        </div>

        <div id="achievementsContainer" class="achievements-list">
            Loading achievements...
        </div>
    </div>

    <script>
        const container = document.getElementById('achievementsContainer');
        let currentTab = 'all';
        let achievements = [];

        // Fetch data from the public achievements.json file
        async function loadAchievements() {
            try {
                const response = await fetch('./achievements.json');
                achievements = await response.json();
                renderAchievements();
            } catch (error) {
                container.innerHTML = '<p style="text-align:center; color:red;">Failed to load achievements list.</p>';
                console.error(error);
            }
        }

        function renderAchievements() {
            container.innerHTML = '';
            
            const filtered = currentTab === 'all' 
                ? achievements 
                : achievements.filter(item => item.category === currentTab);

            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#777;">No achievements in this category yet.</p>';
                return;
            }

            filtered.forEach(achievement => {
                const card = document.createElement('div');
                card.className = 'achievement-card';
                
                card.innerHTML = `
                    <div class="achievement-header">
                        <div class="achievement-date">${achievement.date}</div>
                        <span class="achievement-category">${achievement.category}</span>
                    </div>
                    <h3 class="achievement-title">${achievement.title}</h3>
                    <p class="achievement-desc">${achievement.description}</p>
                `;
                
                container.appendChild(card);
            });
        }

        function switchTab(event, tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderAchievements();
        }

        // Start the website by pulling from the json file
        loadAchievements();
    </script>
</body>
</html>
